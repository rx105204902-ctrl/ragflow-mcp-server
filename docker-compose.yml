services:
  ragflow-mcp-server:
    build:
      context: .
    image: ragflow-mcp-server:latest
    container_name: ragflow-mcp-server
    environment:
      RAGFLOW_MCP_HOST: ${RAGFLOW_MCP_HOST:-0.0.0.0}
      RAGFLOW_MCP_PORT: ${RAGFLOW_MCP_PORT:-9388}
      RAGFLOW_MCP_BASE_URL: ${RAGFLOW_MCP_BASE_URL:-http://127.0.0.1:9380}
      RAGFLOW_MCP_LAUNCH_MODE: ${RAGFLOW_MCP_LAUNCH_MODE:-self-host}
      RAGFLOW_MCP_HOST_API_KEY: ${RAGFLOW_MCP_HOST_API_KEY:?RAGFLOW_MCP_HOST_API_KEY is required}
      RAGFLOW_MCP_TRANSPORT_SSE_ENABLED: ${RAGFLOW_MCP_TRANSPORT_SSE_ENABLED:-true}
      RAGFLOW_MCP_TRANSPORT_STREAMABLE_ENABLED: ${RAGFLOW_MCP_TRANSPORT_STREAMABLE_ENABLED:-true}
      RAGFLOW_MCP_JSON_RESPONSE: ${RAGFLOW_MCP_JSON_RESPONSE:-true}
    ports:
      - "${RAGFLOW_MCP_PUBLISHED_PORT:-9388}:${RAGFLOW_MCP_PORT:-9388}"
    restart: unless-stopped
